# Speech-to-text backend to use.
# Values: "elevenlabs", "openai", "deepgram", or "faster_whisper".
stt_backend=elevenlabs

# Language hint for all STT backends. "en" is recommended for VAICOM English commands.
stt_language=en

# API request timeout in seconds for API-backed providers.
stt_timeout_seconds=30

# Local socket settings. Keep these on localhost: the control socket and introspection API
# are intentionally not remote-control surfaces.
control_host=127.0.0.1
control_port=65432
voiceattack_host=127.0.0.1
voiceattack_port=65433

# Optional introspection API (off by default). Mutating actions require both api_enabled
# and api_actions_enabled. POST bodies above api_max_post_bytes return 413.
api_enabled=false
api_host=127.0.0.1
api_port=8765
api_token=
api_actions_enabled=false
api_max_post_bytes=16384

# DCS kneeboard note wrapping width.
text_line_length=53

# Provider keyterms are generated from existing vocabulary files to avoid duplicate maintenance.
# Values: custom, phonetic_alphabet, fuzzy_words, word_mapping_replacements,
# word_mapping_aliases, dcs_default, vaicom.
stt_keyterm_sources=custom,phonetic_alphabet,fuzzy_words,word_mapping_replacements,dcs_default,vaicom

# Optional comma-separated extra keyterms. Keep this small; prefer fuzzy_words.txt for domain vocabulary.
stt_keyterms_extra=

# ElevenLabs backend settings.
# The API key is read from this environment variable. Never put API keys in this file.
elevenlabs_api_key_env=ELEVENLABS_API_KEY
elevenlabs_model=scribe_v2
elevenlabs_no_verbatim=true
elevenlabs_tag_audio_events=false
elevenlabs_timestamps_granularity=none
elevenlabs_enable_logging=true
elevenlabs_max_keyterms=900
elevenlabs_max_keyterm_chars=50

# OpenAI backend settings.
# Set stt_backend=openai to use this provider.
openai_api_key_env=OPENAI_API_KEY
openai_model=gpt-4o-transcribe
# gpt-4o-transcribe and gpt-4o-mini-transcribe support json only.
openai_response_format=json
openai_include_keyterms_in_prompt=true
openai_max_prompt_keyterms=300
openai_prompt_keyterm_char_budget=6000

# Deepgram backend settings.
# Set stt_backend=deepgram to use this provider.
deepgram_api_key_env=DEEPGRAM_API_KEY
deepgram_model=nova-3
deepgram_smart_format=true
deepgram_detect_language=false
deepgram_max_keyterms=100

# Local faster-whisper fallback settings.
# To run fully offline, set stt_backend=faster_whisper and choose a Whisper model below.
whisper_model=small.en

# Whisper device; GPU or CPU.
whisper_device=GPU

# Theme used for the VAIVOX UI.
# Values: "default" (uses the default theme set for Windows), "light" or "dark"
theme=default

# Reconciliation telemetry (ADR-0006).
# When enabled, each utterance's provenance (raw -> cleaned -> fuzzy -> sent, plus the
# match outcome once the plugin return channel lands) is appended as one JSON line to
# telemetry.jsonl in the per-user VAIVOX data directory (%LOCALAPPDATA%\VAIVOX). The log
# is local-only and feeds the offline reconciliation review. Default: true. Set to false
# to disable all telemetry recording.
telemetry_enabled=true
