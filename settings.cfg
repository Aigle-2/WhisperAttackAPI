# Speech-to-text backend to use.
# Values: "elevenlabs" or "faster_whisper".
stt_backend=elevenlabs

# Language hint for all STT backends. "en" is recommended for VAICOM English commands.
stt_language=en

# API request timeout in seconds for API-backed providers.
stt_timeout_seconds=30

# Keyterms bias supported provider-side by some API backends.
# These are tuned for DCS and VAICOM command recognition, especially non-native English accents.
stt_keyterms=Alpha,Bravo,Charlie,Delta,Echo,Foxtrot,Golf,Hotel,India,Juliet,Kilo,Lima,Mike,November,Oscar,Papa,Quebec,Romeo,Sierra,Tango,Uniform,Victor,Whiskey,X-ray,Yankee,Zulu,Anapa,Batumi,Beslan,Gelendzhik,Gudauta,Kobuleti,Krasnodar,Krymsk,Kutaisi,Maykop,Mineralnye Vody,Mozdok,Nalchik,Novorossiysk,Kolkhi,Senaki,Sochi,Sukhumi,Tbilisi,Vaziani,Enfield,Springfield,Uzi,Colt,Dodge,Ford,Chevy,Pontiac,Overlord,Magic,Wizard,Focus,Darkstar,Texaco,Arco,Shell,Axeman,JTAC,request startup,request taxi,request takeoff,request rejoin,bogey dope,ready to copy

# ElevenLabs backend settings.
# The API key is read from this environment variable. Never put API keys in this file.
elevenlabs_api_key_env=ELEVENLABS_API_KEY
elevenlabs_model=scribe_v2
elevenlabs_no_verbatim=true
elevenlabs_tag_audio_events=false
elevenlabs_timestamps_granularity=none
elevenlabs_enable_logging=true

# Local faster-whisper fallback settings.
# To run fully offline, set stt_backend=faster_whisper and choose a Whisper model below.
whisper_model=small.en

# Whisper device; GPU or CPU.
whisper_device=GPU

# Theme used for the WhisperAttack UI.
# Values: "default" (uses the default theme set for Windows), "light" or "dark"
theme=default
