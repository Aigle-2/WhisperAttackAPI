name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Lint, type-check, test, architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # The gate tooling plus the two pure libraries the reconciliation domain
      # imports (rapidfuzz, text2digits). The heavy app/UI deps are not needed:
      # gates run against the source tree (src/ is on PYTHONPATH / pytest pythonpath).
      # rapidfuzz/text2digits are pinned so the golden characterization tests are
      # reproducible; ruff is pinned to match the formatter locally.
      - name: Install gate tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.15.0 mypy pytest pytest-cov "import-linter>=2.0" \
            rapidfuzz==3.14.5 text2digits==0.1.2

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

      - name: Mypy (strict, src/vaivox)
        run: mypy

      - name: Import-linter (architecture contracts)
        env:
          PYTHONPATH: src
        run: lint-imports --config pyproject.toml --no-cache

      - name: Pytest (+ coverage)
        run: pytest --cov=vaivox --cov-report=term-missing
