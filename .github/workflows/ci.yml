name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Lint, type-check, test, architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # uv provisions the pinned Python (.python-version) and installs the exact
      # locked toolchain (uv.lock). `uv sync` installs the project's core deps
      # (rapidfuzz/text2digits) + the `dev` group — everything the gates need, and
      # nothing from the GUI/audio `app`/`full` extras (they import lazily).
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync gate environment (pinned Python + locked deps)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format (check only)
        run: uv run ruff format --check .

      - name: Mypy (strict, src/vaivox)
        run: uv run mypy

      - name: Import-linter (architecture contracts)
        run: uv run lint-imports --config pyproject.toml --no-cache

      - name: Pytest (+ coverage)
        run: uv run pytest --cov=vaivox --cov-report=term-missing

  plugin-build:
    name: Build VoiceAttack plugin
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: dotnet build plugin/VaivoxVAPlugin/VaivoxVAPlugin.csproj -c Release

      - name: Audit NuGet packages
        run: dotnet list plugin/VaivoxVAPlugin/VaivoxVAPlugin.csproj package --vulnerable --include-transitive

  dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Export audited dependencies
        run: >
          uv export --locked --no-emit-project --extra app --extra mcp --group dev --group build
          --format requirements-txt --output-file requirements-audit.txt

      - name: Audit Python packages
        run: uvx pip-audit -r requirements-audit.txt
